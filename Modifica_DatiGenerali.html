<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<style>
  body {
    margin: 0;
    padding: 0;
    background: black;
    overflow-x: hidden;
  }

  .wrapper {
    position: relative;
    width: 100%;
    max-width: 900px;
    margin: 0 auto;
  }

  /* Immagine base */
  .base-img {
    width: 100%;
    height: auto;
    display: block;
    filter: brightness(0.6); /* scurisce lo sfondo */
    transition: 0.3s ease;
  }

  /* Evidenziazione del bottone */
  .highlight {
    position: absolute;
    width: 100%;      /* dimensione area evidenziata */
    height: 12%;     /* regola se serve */
    top: 0%;        /* posizione verticale */
    left: 0%;       /* posizione orizzontale */
    overflow: hidden;
    border: 3px solid #00aaff; /* bordo evidenziato */
    border-radius: 10px;
  }

  /* L’immagine dentro l’area evidenziata */
  .highlight img {
    width: 200%;
    height: auto;
    transform: translate(-90%, -38%); /* centra Modifica Dati Generali */
  }
</style>
</head>
<body>

<div class="wrapper">
  <img class="base-img" src="msedge_9z1uVjuVkc_260625.png">

  <div class="highlight">
    <img src="msedge_9z1uVjuVkc_260625.png">
  </div>
</div>

</body>
</html>
