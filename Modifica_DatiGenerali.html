<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<style>
  body {
    margin: 0;
    padding: 0;
    background: black;
    overflow-x: hidden;
  }

  .wrapper {
    position: relative;
    width: 100%;
    max-width: 900px;
    margin: 0 auto;
  }

  /* Immagine base */
  .base-img {
    width: 100%;
    height: auto;
    display: block;
    filter: brightness(0.6);
    transition: 0.3s ease;
  }

  /* Ritaglio della tab Permessi */
  .zoom-area {
    position: absolute;
    width: 35%;       /* quanto grande è la tab */
    height: 22%;      /* regola se serve */
    top: 38%;         /* posizione verticale */
    left: 32%;        /* posizione orizzontale */
    overflow: hidden;
    border-radius: 12px;
    transition: 0.3s ease;
  }

  /* L’immagine dentro il ritaglio */
  .zoom-area img {
    width: 200%;      /* zoom */
    height: auto;
    transform: translate(-30%, -40%); /* centra la tab */
    transition: 0.3s ease;
  }

  /* Effetto hover */
  .wrapper:hover .zoom-area {
    transform: scale(1.25);
    box-shadow: 0 0 25px rgba(0, 150, 255, 0.8);
  }

  .wrapper:hover .base-img {
    filter: brightness(0.3);
  }
</style>
</head>
<body>

<div class="wrapper">
  <img class="base-img" src="msedge_9z1uVjuVkc_260625.png">

  <div class="zoom-area">
    <img src="msedge_9z1uVjuVkc_260625.png">
  </div>
</div>

</body>
</html>
