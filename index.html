<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<style>
  .zoom-img {
    width: 300px;
    transition: transform 0.3s ease;
  }
  .zoom-img:hover {
    transform: scale(1.3);
  }
</style>
</head>
<body>
<img src="https://raw.githubusercontent.com/Elisa008/Notion-hover/main/msedge_MM4rzhZeYv.png" class="zoom-img" alt="immagine">

</body>
</html>
