<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<style>
  body {
    margin: 0;
    padding: 0;
    background: transparent;
  }

  /* Area visibile (ritaglio) */
  .crop {
    width: 420px;      /* larghezza della parte visibile */
    height: 260px;     /* altezza della parte visibile */
    overflow: hidden;
    position: relative;
  }

  /* Immagine originale posizionata per mostrare solo la parte cerchiata */
  .zoom-img {
    position: absolute;
    top: -140px;       /* sposta l'immagine verso l'alto */
    left: -310px;      /* sposta l'immagine verso sinistra */
    transition: transform 0.3s ease;
  }

  /* Zoom al passaggio del mouse */
  .crop:hover .zoom-img {
    transform: scale(1.3);
  }
</style>
</head>
<body>

<div class="crop">
  <img src="https://raw.githubusercontent.com/Elisa008/Notion-hover/main/msedge_MM4rzhZeYv.png" class="zoom-img" alt="immagine">
</div>

</body>
</html>
