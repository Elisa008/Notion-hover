<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<style>
  body {
    margin: 0;
    padding: 0;
    background: transparent;
  }

  /* Area visibile (ritaglio) */
  .crop {
    width: 420px;      /* larghezza area visibile */
    height: 260px;     /* altezza area visibile */
    overflow: hidden;
    position: relative;
    border: 0;
  }

  /* Immagine: prima la facciamo vedere, poi la spostiamo piano piano */
  .zoom-img {
    position: absolute;
    top: 0px;          /* partiamo da 0, così la vedi di sicuro */
    left: 0px;
    transition: transform 0.3s ease;
  }

  .crop:hover .zoom-img {
    transform: scale(1.3);
  }
</style>
</head>
<body>

<div class="crop">
  <img src="https://raw.githubusercontent.com/Elisa008/Notion-hover/main/msedge_MM4rzhZeYv.png"
       class="zoom-img" alt="immagine">
</div>

</body>
</html>
