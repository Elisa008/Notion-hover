<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<style>
  body {
    margin: 0;
    padding: 0;
    background: black;
  }

  .crop {
    width: 420px;          /* area visibile */
    height: 260px;
    overflow: hidden;
    background-image: url("https://raw.githubusercontent.com/Elisa008/Notion-hover/main/msedge_MM4rzhZeYv.png");
    background-repeat: no-repeat;
    background-size: 1200px auto;   /* quanto “grande” è l’immagine */
    background-position: -250px -200px; /* QUA si decide cosa si vede */
    transition: transform 0.3s ease;
  }

  .crop:hover {
    transform: scale(1.9);
  }
</style>
</head>
<body>

<div class="crop"></div>

</body>
</html>
